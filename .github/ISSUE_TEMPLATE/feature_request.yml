name: Feature request
description: 提议新的国内申博工作流或通用规则
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请描述可复用的问题，不要提供能够识别真实申请者的材料。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: 建议工作流
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 公开依据或官方来源
      description: 如涉及招生规则，请提供公开官方链接。
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我确认本提议不包含真实申请者信息或敏感材料
          required: true
